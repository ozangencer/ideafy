name: Release

# Triggers on any `v*` tag push — e.g. `git tag v0.2.0 && git push --tags`.
# Both DMGs build on macos-14 (Apple Silicon) with electron-builder cross-
# compiling the x64 target. better-sqlite3 ships prebuilt binaries for both
# arches so no source build is needed. We avoided macos-13 because GitHub's
# Intel runner pool became unreliable as the runner image was deprecated —
# x64 jobs sat in queue for hours.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }} DMG
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root deps
        run: npm ci

      - name: Build Next standalone
        run: npm run build

      - name: Build MCP server
        run: npm run build:mcp

      - name: Package DMG
        # --${{ arch }} filters package.json mac.target to the current runner's
        # arch so we don't double-ship an x64 DMG from the arm64 runner.
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          # Developer ID signing + notarization. Required repo secrets:
          #   CSC_LINK                       (base64-encoded .p12)
          #   CSC_KEY_PASSWORD               (cert password)
          #   APPLE_ID                       (developer Apple ID email)
          #   APPLE_APP_SPECIFIC_PASSWORD    (app-specific password)
          #   APPLE_TEAM_ID                  (Developer Team ID)
          # electron-builder picks them up automatically from the env below.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG to draft Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.dmg.blockmap
          fail_on_unmatched_files: false
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts for manual runs
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ideafy-${{ matrix.arch }}-dmg
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
          retention-days: 14
